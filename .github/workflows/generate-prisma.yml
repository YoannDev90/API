name: Generate Prisma Client

on:
  push:
    paths:
      - 'schema.prisma'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install prisma litellm

      - name: Copy schema from litellm
        run: |
          cp $(python -c "import litellm,os;print(os.path.join(os.path.dirname(litellm.__file__),'proxy','schema.prisma'))") schema.prisma

      - name: Generate prisma client
        run: prisma generate

      - name: Copy generated files to repo
        run: |
          PRISMA_PKG=$(python -c "import prisma,os;print(os.path.dirname(prisma.__file__))")
          mkdir -p prisma_generated
          cp -r "$PRISMA_PKG" prisma_generated/prisma
          ls -la prisma_generated/prisma/

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prisma_generated/
          git diff --cached --quiet || git commit -m "chore: regenerate prisma client [skip ci]"
          git push
