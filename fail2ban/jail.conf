# Configuration Fail2ban pour AlphaLLM API
# Optimisée pour serveur: bon CPU + 1GB RAM

[DEFAULT]
# Paramètres globaux
bantime = 3600          # Ban pendant 1 heure
findtime = 120          # Fenêtre d'observation: 2 minutes
destemail = root@localhost
action = iptables-multiport[name=AlphaLLM, port="80,443"]

[alphallm-ratelimit]
# Détection des abus de rate limit (429)
enabled = true
filter = alphallm
logpath = /var/log/alphallm.log
port = http,https
findtime = 120
bantime = 3600
# Actions multiples pour alerting
action = iptables-multiport[name=AlphaLLM, port="80,443"]
         sendmail-whois[name=AlphaLLM, dest=root@localhost, sender=fail2ban@alphallm]

[alphallm-endpoint-abuse]
# Détection des endpoints critiques sollicités agressivement
enabled = true
filter = alphallm-endpoint-abuse
logpath = /var/log/alphallm.log
port = http,https
findtime = 60           # En 1 minute
bantime = 7200          # Ban 2h pour endpoint abuse
action = iptables-multiport[name=AlphaLLM-Endpoint, port="80,443"]
         sendmail-whois[name=AlphaLLM-Endpoint Abuse, dest=root@localhost]

[alphallm-brute-force]
# Détection d'une IP qui fait trop de requêtes en général
enabled = true
filter = alphallm-bruteforce
logpath = /var/log/alphallm.log
port = http,https
findtime = 30
bantime = 86400         # Ban 24h pour brute force
action = iptables-multiport[name=AlphaLLM-BruteForce, port="80,443"]
         sendmail-whois[name=AlphaLLM-BruteForce, dest=root@localhost, sender=fail2ban@alphallm]
